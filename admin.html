<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DLS Premium Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#020617);

background-size:400% 400%;

animation:bgMove 12s infinite;

color:white;

padding:20px;

min-height:100vh;

}


@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.box{

width:95%;

max-width:950px;

margin:25px auto;

padding:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 15px 40px rgba(0,0,0,.5);

}



h1{

text-align:center;

font-size:35px;

margin-bottom:20px;

text-shadow:0 0 20px #38bdf8;

}



h2{

text-align:center;

margin:20px 0;

color:#7dd3fc;

}



select,
input,
button{

width:100%;

padding:14px;

margin:8px 0;

border:none;

border-radius:14px;

font-size:16px;

}



button{

background:linear-gradient(135deg,#2563eb,#9333ea);

color:white;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:translateY(-3px);

box-shadow:0 0 25px #00bfff;

}



.result{

margin-top:15px;

padding:18px;

border-radius:18px;

background:linear-gradient(135deg,#1d4ed8,#2563eb);

}



.delete{

background:linear-gradient(135deg,#dc2626,#ef4444);

}



.edit{

background:linear-gradient(135deg,#16a34a,#22c55e);

}



hr{

margin:30px 0;

border:none;

height:2px;

background:rgba(255,255,255,.2);

}

</style>

</head>


<body>


<div class="box">


<h1>
⚙️ DLS Tournament Admin Panel
</h1>


<h2>
🏆 Group Stage Result
</h2>


<select id="group">

<option value="">
Select Group
</option>

<option>Group A</option>
<option>Group B</option>
<option>Group C</option>
<option>Group D</option>
<option>Group E</option>
<option>Group F</option>
<option>Group G</option>
<option>Group H</option>

</select>



<select id="match">

<option>
Select Match
</option>

</select>



<input id="goal1"
type="number"
placeholder="Team 1 Goal">


<input id="goal2"
type="number"
placeholder="Team 2 Goal">


<button onclick="saveGroupResult()">

💾 Save Group Result

</button>



<h2>
📋 Group Results
</h2>


<div id="groupList"></div>


</div><div class="box">

<h1>
🥇 Knockout Stage
</h1>


<h2>
⚔️ Round of 16
</h2>


<select id="r16match">

<option>
Select Match
</option>

</select>


<input id="r16g1"
type="number"
placeholder="Team 1 Goal">


<input id="r16g2"
type="number"
placeholder="Team 2 Goal">


<button onclick="saveRound16()">

💾 Save Round of 16

</button>


<hr>


<h2>
🏆 Quarter Final
</h2>


<select id="qfmatch">

<option>
Select Quarter Final
</option>

</select>


<input id="qfg1"
type="number"
placeholder="Team 1 Goal">


<input id="qfg2"
type="number"
placeholder="Team 2 Goal">


<button onclick="saveQuarterFinal()">

💾 Save Quarter Final

</button>


<hr>


<h2>
🔥 Semi Final
</h2>


<select id="sfmatch">

<option>
Select Semi Final
</option>

</select>


<input id="sfg1"
type="number"
placeholder="Team 1 Goal">


<input id="sfg2"
type="number"
placeholder="Team 2 Goal">


<button onclick="saveSemiFinal()">

💾 Save Semi Final

</button>


<hr>


<h2>
👑 Final
</h2>


<select id="finalmatch">

<option>
Select Final
</option>

</select>


<input id="fg1"
type="number"
placeholder="Team 1 Goal">


<input id="fg2"
type="number"
placeholder="Team 2 Goal">


<button onclick="saveFinalMatch()">

💾 Save Final

</button>


<h2>
📋 Knockout Results
</h2>


<div id="knockoutList"></div>


</div>


<script>


let matches={


"Group A":[
"Argentina vs Germany",
"Argentina vs Canada",
"Argentina vs Saudi Arabia",
"Germany vs Canada",
"Germany vs Saudi Arabia",
"Canada vs Saudi Arabia"
],


"Group B":[
"Brazil vs Portugal",
"Brazil vs Nigeria",
"Brazil vs Australia",
"Portugal vs Nigeria",
"Portugal vs Australia",
"Nigeria vs Australia"
],


"Group C":[
"France vs England",
"France vs Iran",
"France vs Egypt",
"England vs Iran",
"England vs Egypt",
"Iran vs Egypt"
],


"Group D":[
"Spain vs Italy",
"Spain vs China",
"Spain vs Qatar",
"Italy vs China",
"Italy vs Qatar",
"China vs Qatar"
],


"Group E":[
"Netherlands vs Belgium",
"Netherlands vs Japan",
"Netherlands vs South Korea",
"Belgium vs Japan",
"Belgium vs South Korea",
"Japan vs South Korea"
],


"Group F":[
"Croatia vs Uruguay",
"Croatia vs Morocco",
"Croatia vs Senegal",
"Uruguay vs Morocco",
"Uruguay vs Senegal",
"Morocco vs Senegal"
],


"Group G":[
"Colombia vs Switzerland",
"Colombia vs Poland",
"Colombia vs Denmark",
"Switzerland vs Poland",
"Switzerland vs Denmark",
"Poland vs Denmark"
],


"Group H":[
"USA vs Turkey",
"USA vs Serbia",
"USA vs Ukraine",
"Turkey vs Serbia",
"Turkey vs Ukraine",
"Serbia vs Ukraine"
]


};





group.onchange=function(){


match.innerHTML=
"<option>Select Match</option>";



matches[group.value].forEach(function(m){


let option=document.createElement("option");


option.textContent=m;


match.appendChild(option);


});


};




// Group stage complete check

function isGroupFinished(){


let data=
JSON.parse(localStorage.groupResults || "[]");


return data.length>=48;


}



// Round complete check

function isRoundFinished(round,total){


let data=
JSON.parse(localStorage.knockoutResults || "[]");


let count=
data.filter(x=>x.round==round).length;


return count>=total;


}// ==========================
// SAVE GROUP RESULT
// ==========================

function saveGroupResult(){

let data =
JSON.parse(localStorage.groupResults || "[]");


let result={

match:match.value,

score:
goal1.value+" - "+goal2.value

};


let index=data.findIndex(x=>

x.match==result.match

);


if(index>=0){

data[index]=result;

}else{

data.push(result);

}


localStorage.groupResults=
JSON.stringify(data);



showGroup();

loadRound16Matches();


alert("Group Result Saved ✅");


}





// ==========================
// SHOW GROUP RESULT
// ==========================

function showGroup(){


let data =
JSON.parse(localStorage.groupResults || "[]");


let box =
document.getElementById("groupList");


box.innerHTML="";



data.forEach((r,i)=>{


box.innerHTML += `

<div class="result">

<b>${r.match}</b>

<br>

⚽ Score : ${r.score}

<br><br>


<button class="delete"
onclick="deleteGroup(${i})">

🗑 Delete

</button>


</div>

`;

});


}





// DELETE GROUP

function deleteGroup(i){


let data =
JSON.parse(localStorage.groupResults || "[]");


data.splice(i,1);


localStorage.groupResults=
JSON.stringify(data);


showGroup();

loadRound16Matches();

}







// ==========================
// LOAD ROUND OF 16
// ==========================


function loadRound16Matches(){


let select=
document.getElementById("r16match");


select.innerHTML=
"<option>Select Match</option>";



if(!isGroupFinished()){


select.innerHTML=
"<option>🔒 Finish Group Stage First</option>";


return;


}



let list =
JSON.parse(localStorage.r16Matches || "[]");



list.forEach(m=>{


let option=document.createElement("option");


option.textContent=m;


select.appendChild(option);


});


}








// ==========================
// WINNER FIND
// ==========================

function getWinner(match,score){


let teams=match.split(" vs ");


let goals=score.split("-");


let g1=Number(goals[0]);

let g2=Number(goals[1]);



if(g1>g2){

return teams[0].trim();

}


if(g2>g1){

return teams[1].trim();

}


return "";

}







// ==========================
// SAVE ROUND OF 16
// ==========================


function saveRound16(){


if(!isGroupFinished()){


alert("🔒 Complete Group Stage First");

return;


}


let data=
JSON.parse(localStorage.knockoutResults || "[]");



let result={


round:"Round of 16",

match:r16match.value,

score:
r16g1.value+" - "+r16g2.value


};



data.push(result);



localStorage.knockoutResults=
JSON.stringify(data);



showKnockout();


generateQuarterFinal();


alert("Round of 16 Saved ✅");


}






// ==========================
// GENERATE QUARTER FINAL
// ==========================


function generateQuarterFinal(){


let data =
JSON.parse(localStorage.knockoutResults || "[]");


let winners=[];



data.forEach(r=>{


if(r.round=="Round of 16"){


let w=getWinner(r.match,r.score);


if(w!=""){

winners.push(w);

}


}


});



if(winners.length<8){

return;

}




let qf=[


winners[0]+" vs "+winners[1],


winners[2]+" vs "+winners[3],


winners[4]+" vs "+winners[5],


winners[6]+" vs "+winners[7]


];



localStorage.qfMatches=
JSON.stringify(qf);



let select=
document.getElementById("qfmatch");


select.innerHTML=
"<option>Select Quarter Final</option>";



qf.forEach(m=>{


let option=document.createElement("option");


option.textContent=m;


select.appendChild(option);


});


}






// ==========================
// SAVE QUARTER FINAL
// ==========================


function saveQuarterFinal(){


if(!isRoundFinished("Round of 16",8)){


alert("🔒 Complete Round of 16 First");


return;


}



let data =
JSON.parse(localStorage.knockoutResults || "[]");


let result={


round:"Quarter Final",

match:qfmatch.value,

score:
qfg1.value+" - "+qfg2.value

};



data.push(result);



localStorage.knockoutResults=
JSON.stringify(data);



showKnockout();


generateSemiFinal();



alert("Quarter Final Saved ✅");


}// ==========================
// GENERATE SEMI FINAL
// ==========================

function generateSemiFinal(){


let data =
JSON.parse(localStorage.knockoutResults || "[]");


let winners=[];



data.forEach(r=>{


if(r.round=="Quarter Final"){


let w =
getWinner(r.match,r.score);



if(w!=""){

winners.push(w);

}


}


});



if(winners.length<4){

return;

}



let sf=[


winners[0]+" vs "+winners[1],


winners[2]+" vs "+winners[3]


];



localStorage.sfMatches=
JSON.stringify(sf);



let select =
document.getElementById("sfmatch");



select.innerHTML=
"<option>Select Semi Final</option>";



sf.forEach(m=>{


let option=document.createElement("option");


option.textContent=m;


select.appendChild(option);


});


}







// ==========================
// SAVE SEMI FINAL
// ==========================


function saveSemiFinal(){


if(!isRoundFinished("Quarter Final",4)){


alert("🔒 Complete Quarter Final First");


return;


}



let data =
JSON.parse(localStorage.knockoutResults || "[]");



let result={


round:"Semi Final",

match:sfmatch.value,

score:
sfg1.value+" - "+sfg2.value


};



data.push(result);



localStorage.knockoutResults=
JSON.stringify(data);



showKnockout();


generateFinal();



alert("Semi Final Saved ✅");


}








// ==========================
// GENERATE FINAL
// ==========================


function generateFinal(){


let data =
JSON.parse(localStorage.knockoutResults || "[]");


let winners=[];



data.forEach(r=>{


if(r.round=="Semi Final"){


let w =
getWinner(r.match,r.score);



if(w!=""){

winners.push(w);

}


}


});



if(winners.length<2){

return;

}



let finalMatch=[

winners[0]+" vs "+winners[1]

];



localStorage.finalMatches=
JSON.stringify(finalMatch);



let select =
document.getElementById("finalmatch");


select.innerHTML=
"<option>Select Final</option>";



finalMatch.forEach(m=>{


let option=document.createElement("option");


option.textContent=m;


select.appendChild(option);


});


}







// ==========================
// SAVE FINAL
// ==========================


function saveFinalMatch(){


if(!isRoundFinished("Semi Final",2)){


alert("🔒 Complete Semi Final First");


return;


}



let data =
JSON.parse(localStorage.knockoutResults || "[]");



let result={


round:"Final",

match:finalmatch.value,

score:
fg1.value+" - "+fg2.value

};



data.push(result);



localStorage.knockoutResults=
JSON.stringify(data);



generateChampion();


showKnockout();



alert("Final Saved 🏆");


}







// ==========================
// GENERATE CHAMPION
// ==========================

function generateChampion(){


let data =
JSON.parse(localStorage.knockoutResults || "[]");



data.forEach(r=>{


if(r.round=="Final"){


let champion =
getWinner(r.match,r.score);



if(champion!=""){


localStorage.champion=champion;


}


}


});


showChampion();


}// ==========================
// SHOW KNOCKOUT RESULT
// ==========================

function showKnockout(){


let data =
JSON.parse(localStorage.knockoutResults || "[]");


let box =
document.getElementById("knockoutList");


box.innerHTML="";



data.forEach((r,i)=>{


box.innerHTML += `

<div class="result">

<b>${r.round}</b>

<br>

${r.match}

<br>

⚽ Score : ${r.score}


<br><br>


<button class="delete"
onclick="deleteKnockout(${i})">

🗑 Delete

</button>


</div>

`;

});


showChampion();


}







// ==========================
// DELETE KNOCKOUT RESULT
// ==========================


function deleteKnockout(i){


let data =
JSON.parse(localStorage.knockoutResults || "[]");



data.splice(i,1);



localStorage.knockoutResults =
JSON.stringify(data);



showKnockout();


generateQuarterFinal();

generateSemiFinal();

generateFinal();

generateChampion();


}







// ==========================
// SHOW CHAMPION
// ==========================

function showChampion(){


let champion =
localStorage.getItem("champion") || "";



if(champion=="") return;



let box =
document.getElementById("knockoutList");



box.innerHTML += `

<div class="result"

style="
background:linear-gradient(135deg,#facc15,#f97316);
color:black;
text-align:center;
font-size:24px;
font-weight:bold;
">

🏆 WORLD CHAMPION

<br><br>

${champion}

</div>

`;

}








// ==========================
// NEW TOURNAMENT
// ==========================


function newTournament(){


if(!confirm("Start New Tournament?")){

return;

}



localStorage.removeItem("groupResults");

localStorage.removeItem("knockoutResults");

localStorage.removeItem("r16Matches");

localStorage.removeItem("qfMatches");

localStorage.removeItem("sfMatches");

localStorage.removeItem("finalMatches");

localStorage.removeItem("champion");



alert("New Tournament Started ✅");


location.reload();


}







// ==========================
// ADMIN PASSWORD
// ==========================


function checkPassword(){


let pass =
document.getElementById("adminPass").value;



if(pass=="sayed0909"){


document.getElementById("passwordBox").style.display="none";


}

else{


alert("Wrong Password ❌");


}


}







// ==========================
// PAGE LOAD
// ==========================


window.onload=function(){


showGroup();


loadRound16Matches();


generateQuarterFinal();


generateSemiFinal();


generateFinal();


generateChampion();


showKnockout();


};





setInterval(function(){


showGroup();

showKnockout();


},2000);



</script>





<!-- NEW TOURNAMENT BUTTON -->

<div class="box">


<button onclick="newTournament()"

style="
background:linear-gradient(135deg,#dc2626,#b91c1c);
">

🗑 Start New Tournament

</button>


</div>







<!-- ADMIN LOGIN -->

<div id="passwordBox"

style="

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#020617;

display:flex;

align-items:center;

justify-content:center;

z-index:9999;

">


<div

style="

background:#1e293b;

padding:30px;

border-radius:25px;

width:90%;

max-width:350px;

text-align:center;

">


<h2 style="color:#facc15;">

🔐 Admin Login

</h2>



<input

id="adminPass"

type="password"

placeholder="Enter Password">



<button onclick="checkPassword()">

Login

</button>



</div>

</div>



</body>

</html>
