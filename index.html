<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLS World Cup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#2563eb);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:460px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 15px 40px rgba(0,0,0,.45);
text-align:center;
}

.logo{
font-size:90px;
filter:drop-shadow(0 0 20px gold);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

h1{
margin-top:10px;
font-size:38px;
font-weight:bold;
color:#fff;
text-shadow:0 0 20px #38bdf8;
}

.subtitle{
margin-top:8px;
margin-bottom:35px;
font-size:17px;
color:#dbeafe;
}.menu{
display:flex;
flex-direction:column;
gap:22px;
margin-top:35px;
}

.menu a{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 28px;
text-decoration:none;
color:#fff;
font-size:20px;
font-weight:bold;
border-radius:22px;
background:linear-gradient(90deg,#18a8f3,#176dff);
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:.35s;
}

.menu a:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 0 30px #32b8ff;
}

.left{
display:flex;
align-items:center;
gap:18px;
}

.icon{
font-size:36px;
}

.arrow{
font-size:34px;
font-weight:bold;
}

.footer{
margin-top:35px;
font-size:16px;
color:#ddd;
letter-spacing:2px;
}</style>
</head>

<body>

<div class="container">

<div class="logo">🏆</div>

<h1>DLS WORLD CUP</h1>

<p class="subtitle">The Ultimate Football Tournament</p>

<div class="menu">

<a href="teams.html">
<div class="left">
<span class="icon">⚽</span>
<span>Teams</span>
</div>
<span class="arrow">➜</span>
</a>

<a href="fixtures.html">
<div class="left">
<span class="icon">🏟️</span>
<span>Fixtures</span>
</div>
<span class="arrow">➜</span>
</a>

<a href="table.html">
<div class="left">
<span class="icon">📊</span>
<span>Points Table</span>
</div>
<span class="arrow">➜</span>
</a>

<a href="knockout.html">
<div class="left">
<span class="icon">🏆</span>
<span>Knockout</span>
</div>
<span class="arrow">➜</span>
</a>

<a href="admin.html">
<div class="left">
<span class="icon">⚙️</span>
<span>Admin Panel</span>
</div>
<span class="arrow">➜</span>
</a><div class="footer">

⭐ Season 2025 • Premium Edition ⭐

</div>

</div>

<script>

const cards = document.querySelectorAll(".menu a");

cards.forEach((card,index)=>{

card.style.opacity="0";
card.style.transform="translateY(30px)";

setTimeout(()=>{

card.style.opacity="1";
card.style.transform="translateY(0)";
card.style.transition=".5s";

},index*120);

});

cards.forEach(card=>{

card.addEventListener("touchstart",()=>{

card.style.transform="scale(.97)";

});

card.addEventListener("touchend",()=>{

setTimeout(()=>{

card.style.transform="";

},120);

});

});</style>
</head>
