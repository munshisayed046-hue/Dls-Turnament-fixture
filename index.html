<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

body{

linear-gradient(

}



button:hover{

transform:

translateY(-3px);

<script>


let editIndex=-1;



let matches={


"Group A":[

],

],



"Group G":[

"Colombia vs Switzerland",

group.onchange=function(){


match.innerHTML=

"<option>Select Match</option>";

};function saveGroupResult(){


let data=

JSON.parse(

localStorage.groupResults || "[]"

);



let result={


match:match.value,


score:

goal1.value+" - "+goal2.value


};



// একই ম্যাচ আবার দিলে Update হবে

let index=data.findIndex(x=>

x.match==result.match

);



if(index>=0){


data[index]=result;


}

else{


data.push(result);


}



localStorage.groupResults=

JSON.stringify(data);



loadRound16Matches();


showGroup();



alert("Group Result Saved ✅");


}





function showGroup(){


let data=

JSON.parse(

localStorage.groupResults || "[]"

);



let box=

document.getElementById("groupList");



box.innerHTML="";



data.forEach((r,i)=>{


box.innerHTML+=`


<div class="result">


<b>

${r.match}

</b>


<br>


Score : ${r.score}


<br><br>



<button class="edit"

onclick="editGroup(${i})">

✏️ Edit

</button>



<button class="delete"

onclick="deleteGroup(${i})">

🗑 Delete

</button>



</div>


`;



});


}





function editGroup(i){


let data=

JSON.parse(

localStorage.groupResults || "[]"

);



let r=data[i];


let score=

r.score.split("-");



goal1.value=

score[0].trim();



goal2.value=

score[1].trim();



match.value=

r.match;



}





function deleteGroup(i){


let data=

JSON.parse(

localStorage.groupResults || "[]"

);



data.splice(i,1);



localStorage.groupResults=

JSON.stringify(data);



loadRound16Matches();


showGroup();



alert("Deleted ✅");


}// ===============================
// Round of 16 Auto Generate
// ===============================


function loadRound16Matches(){


let r16=

JSON.parse(

localStorage.r16Matches || "[]"

);



let select=

document.getElementById("r16match");



select.innerHTML=

"<option>Select Match</option>";



r16.forEach(m=>{


let option=

document.createElement("option");


option.textContent=m;


select.appendChild(option);


});



}




// ===============================
// Winner Function
// ===============================


function getWinner(match,score){


let teams=

match.split(" vs ");



let goals=

score.split("-");



let g1=

Number(goals[0]);



let g2=

Number(goals[1]);



if(g1>g2){


return teams[0].trim();


}


else if(g2>g1){


return teams[1].trim();


}


return "";

}





// ===============================
// Save Round of 16
// ===============================


function saveRound16(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let result={


round:"Round of 16",


match:r16match.value,


score:

r16g1.value+" - "+r16g2.value


};





let index=data.findIndex(x=>

x.round=="Round of 16"

&&

x.match==result.match

);



if(index>=0){


data[index]=result;


}

else{


data.push(result);


}





localStorage.knockoutResults=

JSON.stringify(data);



showKnockout();


generateQuarterFinal();



alert(

"Round of 16 Saved ✅"

);


}




// ===============================
// Generate Quarter Final
// ===============================


function generateQuarterFinal(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let winners=[];



data.forEach(r=>{


if(r.round=="Round of 16"){


let w=

getWinner(

r.match,

r.score

);



if(w){

winners.push(w);

}


}


});





if(winners.length<8){

return;

}





let qf=[


winners[0]+" vs "+winners[1],


winners[2]+" vs "+winners[3],


winners[4]+" vs "+winners[5],


winners[6]+" vs "+winners[7]


];




localStorage.qfMatches=

JSON.stringify(qf);





let select=

document.getElementById("qfmatch");



select.innerHTML=

"<option>Select Quarter Final</option>";




qf.forEach(m=>{


let option=

document.createElement("option");


option.textContent=m;


select.appendChild(option);



});


  }// ===============================
// Save Quarter Final
// ===============================


function saveQuarterFinal(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let result={


round:"Quarter Final",


match:qfmatch.value,


score:

qfg1.value+" - "+qfg2.value


};





let index=data.findIndex(x=>

x.round=="Quarter Final"

&&

x.match==result.match

);



if(index>=0){


data[index]=result;


}

else{


data.push(result);


}




localStorage.knockoutResults=

JSON.stringify(data);



showKnockout();


generateSemiFinal();



alert(

"Quarter Final Saved ✅"

);


}





// ===============================
// Generate Semi Final
// ===============================


function generateSemiFinal(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let winners=[];



data.forEach(r=>{


if(r.round=="Quarter Final"){


let w=

getWinner(

r.match,

r.score

);



if(w){


winners.push(w);


}



}


});





if(winners.length<4){

return;

}





let sf=[


winners[0]+" vs "+winners[1],


winners[2]+" vs "+winners[3]


];





localStorage.sfMatches=

JSON.stringify(sf);





let select=

document.getElementById("sfmatch");



select.innerHTML=

"<option>Select Semi Final</option>";





sf.forEach(m=>{


let option=

document.createElement("option");



option.textContent=m;


select.appendChild(option);



});



}





// ===============================
// Save Semi Final
// ===============================


function saveSemiFinal(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let result={


round:"Semi Final",


match:sfmatch.value,


score:

sfg1.value+" - "+sfg2.value


};





let index=data.findIndex(x=>

x.round=="Semi Final"

&&

x.match==result.match

);



if(index>=0){


data[index]=result;


}

else{


data.push(result);


}





localStorage.knockoutResults=

JSON.stringify(data);



showKnockout();


generateFinal();



alert(

"Semi Final Saved ✅"

);



}// ===============================
// Generate Final
// ===============================


function generateFinal(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let winners=[];



data.forEach(r=>{


if(r.round=="Semi Final"){


let w=

getWinner(

r.match,

r.score

);



if(w){


winners.push(w);


}


}


});





if(winners.length<2){

return;

}





let finalMatch=[

winners[0]+" vs "+winners[1]

];





localStorage.finalMatches=

JSON.stringify(finalMatch);





let select=

document.getElementById("finalmatch");



select.innerHTML=

"<option>Select Final</option>";




finalMatch.forEach(m=>{


let option=

document.createElement("option");


option.textContent=m;


select.appendChild(option);



});


}





// ===============================
// Save Final
// ===============================


function saveFinalMatch(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let result={


round:"Final",


match:finalmatch.value,


score:

fg1.value+" - "+fg2.value


};





let index=data.findIndex(x=>

x.round=="Final"

&&

x.match==result.match

);



if(index>=0){


data[index]=result;


}

else{


data.push(result);


}





localStorage.knockoutResults=

JSON.stringify(data);



showKnockout();


generateChampion();



alert(

"Final Saved ✅"

);



}





// ===============================
// Champion Generate
// ===============================


function generateChampion(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let champion="";



data.forEach(r=>{


if(r.round=="Final"){


champion=

getWinner(

r.match,

r.score

);


}


});





if(champion!=""){


localStorage.champion=

champion;


}



}





// ===============================
// Show Knockout Results
// ===============================


function showKnockout(){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



let box=

document.getElementById("knockoutList");



box.innerHTML="";





data.forEach((r,i)=>{


box.innerHTML+=`


<div class="result">


<b>

${r.round}

</b>


<br>


${r.match}


<br>


Score : ${r.score}



<br><br>



<button class="delete"

onclick="deleteKnockout(${i})">

🗑 Delete

</button>



</div>


`;


});



}// ===============================
// Delete Knockout Result
// ===============================


function deleteKnockout(index){


let data=

JSON.parse(

localStorage.knockoutResults || "[]"

);



data.splice(index,1);



localStorage.knockoutResults=

JSON.stringify(data);



showKnockout();


generateQuarterFinal();


generateSemiFinal();


generateFinal();


generateChampion();



alert(

"Result Deleted ✅"

);



}





// ===============================
// Champion Show
// ===============================


function showChampion(){


let champion=

localStorage.getItem("champion") || "";



if(champion=="") return;



let box=

document.getElementById("knockoutList");



box.innerHTML+=`


<div class="result"

style="

background:linear-gradient(135deg,#facc15,#f97316);

color:black;

font-size:25px;

font-weight:bold;

text-align:center;

">

🏆 WORLD CHAMPION

<br><br>

${champion}


</div>


`;



}
