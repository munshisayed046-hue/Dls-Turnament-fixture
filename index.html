<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLS World Cup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#020617);
background-size:400% 400%;
animation:bgMove 12s infinite;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
text-align:center;
}

.logo{
font-size:80px;
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

h1{
color:#fff;
font-size:38px;
margin-top:10px;
text-shadow:0 0 20px #38bdf8;
}

p{
color:#cbd5e1;
margin:12px 0 30px;
font-size:17px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu a{
text-decoration:none;
padding:16px;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#9333ea);
color:#fff;
font-size:18px;
font-weight:bold;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

.menu a:hover{
transform:translateY(-4px);
box-shadow:0 0 25px #38bdf8;
}.menu a:nth-child(1){background:linear-gradient(135deg,#2563eb,#3b82f6);}
.menu a:nth-child(2){background:linear-gradient(135deg,#16a34a,#22c55e);}
.menu a:nth-child(3){background:linear-gradient(135deg,#ca8a04,#facc15);}
.menu a:nth-child(4){background:linear-gradient(135deg,#dc2626,#ef4444);}
.menu a:nth-child(5){background:linear-gradient(135deg,#7c3aed,#9333ea);}
.menu a:nth-child(6){background:linear-gradient(135deg,#0891b2,#06b6d4);}
.menu a:nth-child(7){background:linear-gradient(135deg,#475569,#64748b);}

.footer{
margin-top:25px;
color:#cbd5e1;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🏆</div>

<h1>DLS World Cup</h1>

<p>Official Tournament Dashboard</p>

<div class="menu">

<a href="teams.html">👥 Teams</a>

<a href="fixtures.html">📅 Fixtures</a>

<a href="table.html">📊 Group Table</a><a href="knockout.html">🥊 Knockout</a>


<a href="admin.html">⚙️ Admin Panel</a>


</div>

<div class="footer">

<p>© 2026 DLS World Cup. All Rights Reserved.</p>

</div>

</div>

<script>

const buttons=document.querySelectorAll(".menu a");

buttons.forEach((btn,index)=>{

btn.style.opacity="0";
btn.style.transform="translateY(25px)";

setTimeout(()=>{

btn.style.transition=".5s";
btn.style.opacity="1";
btn.style.transform="translateY(0)";

},index*120);

});// Hover Click Effect

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

btn.style.transform="scale(.96)";

setTimeout(()=>{

btn.style.transform="";

},150);

});

});

// Floating Logo

const logo=document.querySelector(".logo");

setInterval(()=>{

logo.style.transform="translateY(-8px)";

setTimeout(()=>{

logo.style.transform="translateY(0)";

},500);

},2000);</script>

</body>
</html>
