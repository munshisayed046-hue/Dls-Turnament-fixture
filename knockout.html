<!-- ROUND OF 16 -->

<div class="section">


<h2>
⚔️ Round of 16
</h2>


<div id="r16"></div>


</div>



<script>


// FLAGS

const FLAGS={

Argentina:"🇦🇷",
Germany:"🇩🇪",

Brazil:"🇧🇷",
Portugal:"🇵🇹",

France:"🇫🇷",
England:"🏴",

Spain:"🇪🇸",
Italy:"🇮🇹",

Netherlands:"🇳🇱",
Belgium:"🇧🇪",

Croatia:"🇭🇷",
Uruguay:"🇺🇾",

Colombia:"🇨🇴",
Switzerland:"🇨🇭",

USA:"🇺🇸",
Turkey:"🇹🇷"

};



// DEFAULT ROUND 16


if(!localStorage.r16Matches){


localStorage.r16Matches=

JSON.stringify([


"Argentina vs Germany",

"Brazil vs Portugal",

"France vs England",

"Spain vs Italy",


"Netherlands vs Belgium",

"Croatia vs Uruguay",

"Colombia vs Switzerland",

"USA vs Turkey"


]);


}




let r16Matches=

JSON.parse(

localStorage.r16Matches || "[]"

);



let knockout=

JSON.parse(

localStorage.knockoutResults || "[]"

);



</script><script>


// =======================
// GET WINNER
// =======================


function getWinner(match,score){


let teams = match.split(" vs ");


let goals = score.split("-");


let a = Number(goals[0].trim());

let b = Number(goals[1].trim());



if(a>b){

return teams[0].trim();

}



if(b>a){

return teams[1].trim();

}



return "";

}



// =======================
// TEAM CARD
// =======================


function teamCard(team){


return `

<div>

<span class="flag">

${FLAGS[team] || "🏳️"}

</span>


${team}


</div>

`;

}





// =======================
// LOAD ROUND OF 16
// =======================


function loadRound16(){


let box=document.getElementById("r16");


box.innerHTML="";



r16Matches.forEach(match=>{


let teams=match.split(" vs ");



let result=knockout.find(x=>

x.round=="Round of 16"

&&

x.match==match

);



let score="VS";

let winner="";



if(result){


score=result.score;


winner=getWinner(match,result.score);


}





box.innerHTML+=`

<div class="match">


<div class="teamRow">


${teamCard(teams[0].trim())}


${teamCard(teams[1].trim())}



</div>



<div class="score">

${score}

</div>




${winner?


`

<div class="winner">

🏆 Winner :

${FLAGS[winner] || ""}

${winner}


</div>


`

:""}



</div>

`;



});



}




loadRound16();



  </script><!-- ================= -->
<!-- QUARTER FINAL -->
<!-- ================= -->


<div class="section">


<h2>
🏆 Quarter Final
</h2>


<div id="qf"></div>


</div>




<script>


// =======================
// CREATE QUARTER FINAL
// =======================


function createQuarterFinal(){


let winners=[];



r16Matches.forEach(match=>{


let result=knockout.find(x=>


x.round=="Round of 16"

&&

x.match==match


);



if(result){


let w=getWinner(match,result.score);



if(w){

winners.push(w);

}



}



});





if(winners.length==8){



let qf=[];



for(let i=0;i<8;i+=2){



qf.push(

winners[i]+" vs "+winners[i+1]

);



}



localStorage.qfMatches=

JSON.stringify(qf);



}



}







// =======================
// LOAD QUARTER FINAL
// =======================


function loadQuarterFinal(){


let box=document.getElementById("qf");


box.innerHTML="";



let qfMatches=

JSON.parse(

localStorage.qfMatches || "[]"

);





qfMatches.forEach(match=>{



let teams=match.split(" vs ");



let result=knockout.find(x=>


x.round=="Quarter Final"

&&

x.match==match


);



let score="VS";

let winner="";



if(result){


score=result.score;


winner=getWinner(match,result.score);


}



box.innerHTML+=`


<div class="match">


<div class="teamRow">


${teamCard(teams[0].trim())}



${teamCard(teams[1].trim())}



</div>



<div class="score">

${score}

</div>



${winner?


`

<div class="winner">


🏆 Winner :


${FLAGS[winner]||""}

${winner}


</div>


`

:""}



</div>


`;



});



}





createQuarterFinal();


loadQuarterFinal();



</script><!-- ================= -->
<!-- SEMI FINAL -->
<!-- ================= -->


<div class="section">


<h2>
🔥 Semi Final
</h2>


<div id="sf"></div>


</div>





<script>


// =======================
// CREATE SEMI FINAL
// =======================


function createSemiFinal(){


let qfMatches=

JSON.parse(

localStorage.qfMatches || "[]"

);



let winners=[];



qfMatches.forEach(match=>{


let result=knockout.find(x=>


x.round=="Quarter Final"

&&

x.match==match


);



if(result){


let w=getWinner(match,result.score);



if(w){

winners.push(w);

}



}



});





if(winners.length==4){


let sf=[];



for(let i=0;i<4;i+=2){


sf.push(

winners[i]+" vs "+winners[i+1]

);


}



localStorage.sfMatches=

JSON.stringify(sf);



}



}







// =======================
// LOAD SEMI FINAL
// =======================


function loadSemiFinal(){


let box=document.getElementById("sf");


box.innerHTML="";



let sfMatches=

JSON.parse(

localStorage.sfMatches || "[]"

);





sfMatches.forEach(match=>{



let teams=match.split(" vs ");



let result=knockout.find(x=>


x.round=="Semi Final"

&&

x.match==match


);



let score="VS";

let winner="";



if(result){


score=result.score;


winner=getWinner(match,result.score);


}



box.innerHTML+=`


<div class="match">


<div class="teamRow">


${teamCard(teams[0].trim())}



${teamCard(teams[1].trim())}



</div>



<div class="score">

${score}

</div>



${winner?


`

<div class="winner">


🏆 Winner :


${FLAGS[winner]||""}


${winner}


</div>


`

:""}



</div>



`;



});



}





createSemiFinal();


loadSemiFinal();



</script><!-- ================= -->
<!-- FINAL -->
<!-- ================= -->


<div class="section">


<h2>
👑 Final
</h2>


<div id="final"></div>


</div>





<script>


// =======================
// CREATE FINAL
// =======================


function createFinal(){


let sfMatches=

JSON.parse(

localStorage.sfMatches || "[]"

);



let winners=[];



sfMatches.forEach(match=>{


let result=knockout.find(x=>


x.round=="Semi Final"

&&

x.match==match


);



if(result){


let w=getWinner(match,result.score);



if(w){

winners.push(w);

}



}



});





if(winners.length==2){


localStorage.finalMatches=

JSON.stringify([

winners[0]+" vs "+winners[1]

]);


}



}







// =======================
// LOAD FINAL
// =======================


function loadFinal(){


let box=document.getElementById("final");


box.innerHTML="";



let finalMatches=

JSON.parse(

localStorage.finalMatches || "[]"

);





finalMatches.forEach(match=>{



let teams=match.split(" vs ");



let result=knockout.find(x=>


x.round=="Final"

&&

x.match==match


);



let score="VS";

let winner="";



if(result){


score=result.score;


winner=getWinner(match,result.score);


}





box.innerHTML+=`


<div class="match">


<div class="teamRow">


${teamCard(teams[0].trim())}



${teamCard(teams[1].trim())}



</div>



<div class="score">

${score}

</div>



${winner?


`

<div class="winner">


🏆 Champion :


${FLAGS[winner]||""}

${winner}


</div>


`

:""}



</div>



`;



});



}






// =======================
// FINAL WINNER SAVE
// =======================


function updateChampion(){


let finalMatches=

JSON.parse(

localStorage.finalMatches || "[]"

);



finalMatches.forEach(match=>{



let result=knockout.find(x=>


x.round=="Final"

&&

x.match==match


);



if(result){


let winner=getWinner(

match,

result.score

);



if(winner){


localStorage.setItem(

"champion",

winner

);


}



}



});


}





createFinal();


loadFinal();


updateChampion();



  </script><!-- ================= -->
<!-- WORLD CHAMPION -->
<!-- ================= -->


<div class="section">


<h2>
🏆 World Champion
</h2>


<div id="champion"

style="
text-align:center;
font-size:30px;
padding:25px;
">

👑 To Be Decided


</div>


</div>





<script>


// =======================
// LOAD CHAMPION
// =======================


function loadChampion(){


let champion=

localStorage.getItem("champion") || "";



let box=document.getElementById("champion");



if(champion==""){


box.innerHTML="👑 To Be Decided";


return;


}



box.innerHTML=`


<div style="font-size:65px">

🏆

</div>


<div>


${FLAGS[champion] || ""}

${champion}


</div>


<br>


<div style="font-size:18px">


⭐⭐⭐⭐⭐⭐


<br><br>


WORLD CHAMPION


</div>


`;



}







// =======================
// FULL AUTO UPDATE
// =======================


function refreshKnockout(){



knockout=

JSON.parse(

localStorage.knockoutResults || "[]"

);



r16Matches=

JSON.parse(

localStorage.r16Matches || "[]"

);





createQuarterFinal();


createSemiFinal();


createFinal();


updateChampion();





loadRound16();


loadQuarterFinal();


loadSemiFinal();


loadFinal();


loadChampion();



}






// Auto Refresh


setInterval(function(){


refreshKnockout();


},1000);




// First Load


refreshKnockout();



</script><style>


/* Match Hover Effect */

.match{

position:relative;

overflow:hidden;

transition:.35s;

cursor:pointer;

}



.match:hover{


transform:

translateY(-5px)

scale(1.02);


box-shadow:

0 0 25px #00bfff;


}




/* Shine Animation */


.match::before{


content:"";


position:absolute;


top:0;


left:-120%;


width:100%;


height:100%;


background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.35),

transparent

);



transition:.8s;


}




.match:hover::before{


left:120%;


}





/* Winner Glow */


.winner{


animation:

winnerGlow 2s infinite alternate;


}



@keyframes winnerGlow{


from{


box-shadow:

0 0 8px #16a34a;


}



to{


box-shadow:

0 0 25px #22c55e;


}



}







/* Champion Glow */


#champion{


border-radius:20px;


background:

linear-gradient(

135deg,

#facc15,

#f97316

);


font-weight:bold;


box-shadow:

0 0 30px gold;


animation:

championAnimation 2s infinite alternate;


}





@keyframes championAnimation{


from{


transform:scale(1);


}



to{


transform:scale(1.05);


}



}




/* Logo Animation */


.logo{


animation:

floatLogo 3s infinite;


}




@keyframes floatLogo{


50%{


transform:translateY(-10px);


}



}
