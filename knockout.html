<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DLS World Cup Knockout</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:
linear-gradient(135deg,#06111f,#12305e,#081120);

color:white;

padding:20px;

}


.container{

max-width:900px;

margin:auto;

}


.header{

text-align:center;

margin-bottom:25px;

}


.logo{

font-size:70px;

}


h1{

font-size:38px;

text-shadow:0 0 15px #00bfff;

}


.subtitle{

color:#cbd5e1;

margin-top:10px;

}


.section{

margin-top:25px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.08);

box-shadow:0 10px 30px rgba(0,0,0,.4);

}


.section h2{

text-align:center;

color:#7dd3fc;

margin-bottom:20px;

}


.match{

margin:15px 0;

padding:18px;

border-radius:18px;

background:linear-gradient(135deg,#1d4ed8,#2563eb);

}


.teamRow{

display:flex;

justify-content:space-between;

font-size:18px;

font-weight:bold;

}


.flag{

font-size:25px;

}


.score{

background:white;

color:#2563eb;

width:max-content;

padding:7px 20px;

margin:15px auto;

border-radius:10px;

font-weight:bold;

}


.winner{

background:#16a34a;

padding:10px;

border-radius:10px;

text-align:center;

margin-top:10px;

}


/* hidden until stage complete */

.hide{

display:none;

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<div class="logo">
🏆
</div>


<h1>
DLS World Cup
</h1>


<p class="subtitle">
Premium Knockout Stage
</p>


</div>



<!-- STATUS -->

<div class="section">

<h2>📢 Tournament Status</h2>

<div id="status"
style="
text-align:center;
font-size:22px;
padding:15px;
">

⏳ Waiting...

</div>

</div>



<!-- ROUND OF 16 -->

<div class="section hide" id="r16Box">

<h2>
⚔️ Round of 16
</h2>


<div id="r16"></div>


</div>// =======================
// QUARTER FINAL BOX
// =======================


<div class="section hide" id="qfBox">

<h2>
🏆 Quarter Final
</h2>


<div id="qf"></div>


</div>





<!-- SEMI FINAL -->

<div class="section hide" id="sfBox">


<h2>
🔥 Semi Final
</h2>


<div id="sf"></div>


</div>





<!-- FINAL -->

<div class="section hide" id="finalBox">


<h2>
👑 Final
</h2>


<div id="final"></div>


</div>





<!-- CHAMPION -->

<div class="section hide" id="championBox">


<h2>
🏆 World Champion
</h2>


<div id="champion"

style="
text-align:center;
font-size:30px;
padding:20px;
">

👑 To Be Decided


</div>


</div>





<script>


// =======================
// FLAGS
// =======================


const FLAGS={


Argentina:"🇦🇷",
Germany:"🇩🇪",

Brazil:"🇧🇷",
Portugal:"🇵🇹",

France:"🇫🇷",
England:"🏴",

Spain:"🇪🇸",
Italy:"🇮🇹",

Netherlands:"🇳🇱",
Belgium:"🇧🇪",

Croatia:"🇭🇷",
Uruguay:"🇺🇾",

Colombia:"🇨🇴",
Switzerland:"🇨🇭",

USA:"🇺🇸",
Turkey:"🇹🇷",

Canada:"🇨🇦",
Saudi Arabia:"🇸🇦",

Nigeria:"🇳🇬",
Australia:"🇦🇺",

Iran:"🇮🇷",
Egypt:"🇪🇬",

China:"🇨🇳",
Qatar:"🇶🇦",

Japan:"🇯🇵",
South Korea:"🇰🇷",

Morocco:"🇲🇦",
Senegal:"🇸🇳",

Poland:"🇵🇱",
Denmark:"🇩🇰",

Serbia:"🇷🇸",
Ukraine:"🇺🇦"


};




// =======================
// LOAD DATA
// =======================


let knockout =
JSON.parse(
localStorage.knockoutResults || "[]"
);



let r16Matches =
JSON.parse(
localStorage.r16Matches || "[]"
);// =======================
// TEAM CARD
// =======================


function teamCard(team){

return `

<div>

<span class="flag">

${FLAGS[team] || "🏳️"}

</span>

${team}

</div>

`;

}





// =======================
// GET WINNER
// =======================


function getWinner(match,score){


let teams =
match.split(" vs ");


let goals =
score.split("-");


let a =
Number(goals[0].trim());


let b =
Number(goals[1].trim());



if(a>b){

return teams[0].trim();

}


if(b>a){

return teams[1].trim();

}


return "";

}





// =======================
// GROUP STAGE CHECK
// =======================


function checkGroupComplete(){


let results =
JSON.parse(
localStorage.groupResults || "[]"
);


// 48 group match complete

if(results.length >= 48){

return true;

}


return false;


}





// =======================
// ROUND 16 LOAD
// =======================


function loadRound16(){


let box =
document.getElementById("r16");


box.innerHTML="";



r16Matches.forEach(match=>{


let teams =
match.split(" vs ");



let result =
knockout.find(x=>

x.round=="Round of 16"

&&

x.match==match

);



let score="VS";

let winner="";



if(result){


score=result.score;


winner =
getWinner(match,result.score);


}



box.innerHTML+=`

<div class="match">


<div class="teamRow">

${teamCard(teams[0].trim())}

${teamCard(teams[1].trim())}

</div>



<div class="score">

${score}

</div>



${winner ?


`

<div class="winner">

🏆 Winner :

${FLAGS[winner] || ""}

${winner}

</div>


`

:""}



</div>

`;


});



}






// =======================
// ROUND 16 COMPLETE CHECK
// =======================


function checkRound16Complete(){


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



let matches =
data.filter(x=>

x.round=="Round of 16"

);



return matches.length>=8;


}// =======================
// CREATE QUARTER FINAL
// =======================


function createQuarterFinal(){


let winners=[];


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



data.filter(x=>

x.round=="Round of 16"

)

.forEach(x=>{


let w =
getWinner(
x.match,
x.score
);



if(w){

winners.push(w);

}


});



if(winners.length==8){


let qf=[


winners[0]+" vs "+winners[1],

winners[2]+" vs "+winners[3],

winners[4]+" vs "+winners[5],

winners[6]+" vs "+winners[7]


];


localStorage.qfMatches =
JSON.stringify(qf);


}


}





// =======================
// LOAD QUARTER FINAL
// =======================


function loadQuarterFinal(){


let box =
document.getElementById("qf");


box.innerHTML="";


let qf =
JSON.parse(
localStorage.qfMatches || "[]"
);



qf.forEach(match=>{


let teams =
match.split(" vs ");



box.innerHTML+=`

<div class="match">

<div class="teamRow">

${teamCard(teams[0])}

${teamCard(teams[1])}

</div>


<div class="score">
VS
</div>


</div>


`;



});


}




// =======================
// QUARTER COMPLETE CHECK
// =======================


function checkQuarterComplete(){


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



let qf =
data.filter(x=>

x.round=="Quarter Final"

);



return qf.length>=4;


}







// =======================
// CREATE SEMI FINAL
// =======================


function createSemiFinal(){


let winners=[];


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



data.filter(x=>

x.round=="Quarter Final"

)

.forEach(x=>{


let w =
getWinner(
x.match,
x.score
);



if(w){

winners.push(w);

}


});



if(winners.length==4){


localStorage.sfMatches=

JSON.stringify([


winners[0]+" vs "+winners[1],

winners[2]+" vs "+winners[3]


]);


}


}




// =======================
// LOAD SEMI FINAL
// =======================


function loadSemiFinal(){


let box =
document.getElementById("sf");


box.innerHTML="";


let sf =
JSON.parse(
localStorage.sfMatches || "[]"
);



sf.forEach(match=>{


let teams =
match.split(" vs ");



box.innerHTML+=`

<div class="match">

<div class="teamRow">

${teamCard(teams[0])}

${teamCard(teams[1])}

</div>


<div class="score">
VS
</div>


</div>

`;



});


}// =======================
// CREATE FINAL
// =======================


function createFinal(){


let winners=[];


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



data.filter(x=>

x.round=="Semi Final"

)

.forEach(x=>{


let w =
getWinner(
x.match,
x.score
);



if(w){

winners.push(w);

}


});



if(winners.length==2){


localStorage.finalMatches=

JSON.stringify([

winners[0]+" vs "+winners[1]

]);


}


}





// =======================
// LOAD FINAL
// =======================


function loadFinal(){


let box =
document.getElementById("final");


box.innerHTML="";


let finalMatches =
JSON.parse(
localStorage.finalMatches || "[]"
);



finalMatches.forEach(match=>{


let teams =
match.split(" vs ");



box.innerHTML+=`

<div class="match">


<div class="teamRow">

${teamCard(teams[0])}

${teamCard(teams[1])}

</div>


<div class="score">

VS

</div>


</div>

`;



});


}




// =======================
// CHAMPION
// =======================


function updateChampion(){


let data =
JSON.parse(
localStorage.knockoutResults || "[]"
);



data.forEach(x=>{


if(x.round=="Final"){


let winner =
getWinner(
x.match,
x.score
);



if(winner){


localStorage.champion=winner;


document.getElementById("champion").innerHTML=

`
🏆

<br>

${FLAGS[winner] || ""}

${winner}

<br><br>

WORLD CHAMPION

`;


document.getElementById("championBox").classList.remove("hide");


}


}


});


}





// =======================
// FULL AUTO SYSTEM
// =======================


function updateTournament(){



knockout =
JSON.parse(
localStorage.knockoutResults || "[]"
);



// GROUP COMPLETE

if(checkGroupComplete()){


document.getElementById("r16Box")
.classList.remove("hide");


loadRound16();


}


// ROUND 16 COMPLETE

if(checkRound16Complete()){


createQuarterFinal();


document.getElementById("qfBox")
.classList.remove("hide");


loadQuarterFinal();


}



// QUARTER COMPLETE

if(checkQuarterComplete()){


createSemiFinal();


document.getElementById("sfBox")
.classList.remove("hide");


loadSemiFinal();


}



// SEMI COMPLETE

let sf =
knockout.filter(x=>

x.round=="Semi Final"

);



if(sf.length>=2){


createFinal();


document.getElementById("finalBox")
.classList.remove("hide");


loadFinal();


}



// CHAMPION

updateChampion();



}



// =======================
// AUTO UPDATE
// =======================


setInterval(function(){

updateTournament();

},1000);




// FIRST LOAD

updateTournament();



</script>



<a href="index.html"

style="
display:block;
width:max-content;
margin:30px auto;
padding:12px 25px;
border-radius:15px;
background:#2563eb;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
">

🏠 Back To Home

</a>



</div>


</body>

</html>
