<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>DLS World Cup Points Table</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:
linear-gradient(135deg,#020617,#1e3a8a,#020617);

color:white;

padding:20px;

min-height:100vh;

}



.container{

max-width:1100px;

margin:auto;

}



h1{

text-align:center;

font-size:40px;

margin-bottom:30px;

text-shadow:0 0 20px #38bdf8;

}



.group{

margin-bottom:35px;

}



.group h2{

text-align:center;

padding:15px;

border-radius:18px;

background:
linear-gradient(135deg,#2563eb,#9333ea);

margin-bottom:15px;

}



table{

width:100%;

border-collapse:collapse;

background:rgba(255,255,255,.1);

border-radius:15px;

overflow:hidden;

}



th{

background:#2563eb;

padding:12px;

}



td{

padding:10px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.2);

}



tr:hover{

background:rgba(56,189,248,.2);

}



.team{

text-align:left;

font-weight:bold;

}



.pts{

color:#facc15;

font-weight:bold;

}



</style>


</head>


<body>


<div class="container">


<h1>🏆 DLS World Cup Points Table</h1>


<div id="tables"></div>



<script>


const groups={


A:["Argentina","Germany","Canada","Saudi Arabia"],

B:["Brazil","Portugal","Nigeria","Australia"],

C:["France","England","Iran","Egypt"],

D:["Spain","Italy","China","Qatar"],

E:["Netherlands","Belgium","Japan","South Korea"],

F:["Croatia","Uruguay","Morocco","Senegal"],

G:["Colombia","Switzerland","Poland","Denmark"],

H:["USA","Turkey","Serbia","Ukraine"]


};




// CREATE DATA


let table={};



for(let g in groups){


table[g]={};


groups[g].forEach(team=>{


table[g][team]={

p:0,
w:0,
d:0,
l:0,
gf:0,
ga:0,
pts:0

};


});


}




// GET ADMIN RESULT


let results=

JSON.parse(

localStorage.getItem("groupResults") || "[]"

);





results.forEach(r=>{


let teams=r.match.split(" vs ");


let score=r.score.split("-");



let t1=teams[0].trim();

let t2=teams[1].trim();



let g="";



for(let x in groups){


if(groups[x].includes(t1)){

g=x;

}

}



if(!g) return;



let a=table[g][t1];

let b=table[g][t2];



if(!a || !b) return;



let s1=Number(score[0]);

let s2=Number(score[1]);




a.p++;

b.p++;



a.gf+=s1;

a.ga+=s2;


b.gf+=s2;

b.ga+=s1;



if(s1>s2){


a.w++;

a.pts+=3;

b.l++;


}

else if(s2>s1){


b.w++;

b.pts+=3;

a.l++;


}

else{


a.d++;

b.d++;

a.pts++;

b.pts++;


}



});







// DISPLAY


let html="";



for(let g in groups){


let teams=[...groups[g]];



teams.sort((x,y)=>{


let A=table[g][x];

let B=table[g][y];



if(B.pts!=A.pts)

return B.pts-A.pts;



return (B.gf-B.ga)-(A.gf-A.ga);


});




html+=`

<div class="group">

<h2>Group ${g}</h2>


<table>

<tr>

<th>Pos</th>

<th>Team</th>

<th>P</th>

<th>W</th>

<th>D</th>

<th>L</th>

<th>GF</th>

<th>GA</th>

<th>GD</th>

<th>PTS</th>

</tr>


`;



teams.forEach((team,i)=>{


let t=table[g][team];


html+=`

<tr>

<td>${i+1}</td>

<td class="team">${team}</td>

<td>${t.p}</td>

<td>${t.w}</td>

<td>${t.d}</td>

<td>${t.l}</td>

<td>${t.gf}</td>

<td>${t.ga}</td>

<td>${t.gf-t.ga}</td>

<td class="pts">${t.pts}</td>

</tr>

`;



});



html+=`

</table>

</div>

`;



}



document.getElementById("tables").innerHTML=html;



</script>


</div>


</body>

</html>
