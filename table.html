<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DLS World Cup Points Table</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{

min-height:100vh;

padding:20px;

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e3a8a,
#020617
);

background-size:400% 400%;
animation:bgMove 12s linear infinite;

color:#fff;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

width:100%;
max-width:1100px;
margin:auto;

}

.title{

text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:35px;
text-shadow:0 0 20px #38bdf8;

}

.group{

margin-bottom:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(16px);

border-radius:22px;

padding:18px;

box-shadow:0 12px 35px rgba(0,0,0,.45);

}

.group h2{

text-align:center;

padding:15px;

border-radius:15px;

background:
linear-gradient(
135deg,
#2563eb,
#9333ea
);

margin-bottom:15px;

font-size:30px;

}table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:18px;
background:rgba(255,255,255,.06);
}

th{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
padding:13px;
font-size:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.15);
transition:.3s;
}

tr:hover{
background:rgba(56,189,248,.15);
}

.team{
text-align:left;
font-weight:bold;
padding-left:12px;
}

.pts{
color:#facc15;
font-weight:bold;
font-size:17px;
}

@media(max-width:768px){

body{
padding:10px;
}

.title{
font-size:30px;
}

.group h2{
font-size:24px;
}

table{
font-size:12px;
}

th,td{
padding:7px 4px;
}

.team{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">🏆 DLS World Cup Points Table</h1>

<div id="tables"></div>

<script>

const groups={

A:["Argentina","Germany","Canada","Saudi Arabia"],
B:["Brazil","Portugal","Nigeria","Australia"],
C:["France","England","Iran","Egypt"],
D:["Spain","Italy","China","Qatar"],
E:["Netherlands","Belgium","Japan","South Korea"],
F:["Croatia","Uruguay","Morocco","Senegal"],
G:["Colombia","Switzerland","Poland","Denmark"],
H:["USA","Turkey","Serbia","Ukraine"]

};

let table={};for(let g in groups){

table[g]={};

groups[g].forEach(team=>{

table[g][team]={

p:0,
w:0,
d:0,
l:0,
gf:0,
ga:0,
pts:0

};

});

}

const results=JSON.parse(
localStorage.getItem("groupResults") || "[]"
);

results.forEach(r=>{

const teams=r.match.split(" vs ");

const score=r.score.split("-");

const team1=teams[0].trim();
const team2=teams[1].trim();

let group="";

for(let g in groups){

if(groups[g].includes(team1)){

group=g;
break;

}

}

if(group==="") return;

const A=table[group][team1];
const B=table[group][team2];

if(!A || !B) return;

const g1=parseInt(score[0]) || 0;
const g2=parseInt(score[1]) || 0;

A.p++;
B.p++;

A.gf+=g1;
A.ga+=g2;

B.gf+=g2;
B.ga+=g1;

if(g1>g2){

A.w++;
A.pts+=3;
B.l++;

}else if(g2>g1){

B.w++;
B.pts+=3;
A.l++;

}else{

A.d++;
B.d++;
A.pts++;
B.pts++;

}

});let html="";

for(let g in groups){

let teams=[...groups[g]];

teams.sort((a,b)=>{

let A=table[g][a];
let B=table[g][b];

if(B.pts!==A.pts)
return B.pts-A.pts;

let gdA=A.gf-A.ga;
let gdB=B.gf-B.ga;

if(gdB!==gdA)
return gdB-gdA;

if(B.gf!==A.gf)
return B.gf-A.gf;

return a.localeCompare(b);

});

html+=`

<div class="group">

<h2>🏆 Group ${g}</h2>

<table>

<tr>

<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>PTS</th>

</tr>

`;

teams.forEach((team,index)=>{

let t=table[g][team];

html+=`

<tr>

<td>${index+1}</td>

<td class="team">${team}</td>

<td>${t.p}</td>

<td>${t.w}</td>

<td>${t.d}</td>

<td>${t.l}</td>

<td>${t.gf}</td>

<td>${t.ga}</td>

<td>${t.gf-t.ga}</td>

<td class="pts">${t.pts}</td>

</tr>

`;

});html+=`

</table>

</div>

`;

}

document.getElementById("tables").innerHTML=html;

// Auto Refresh Every 2 Seconds

setInterval(()=>{

location.reload();

},2000);</script>

</div>

</body>
</html>
