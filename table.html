<!DOCTYPE html>
<html>

<head>

<title>DLS Points Table</title>

<style>

body{
font-family:Arial;
background:#0b132b;
color:white;
text-align:center;
}

table{
width:95%;
margin:20px auto;
border-collapse:collapse;
background:#1c2541;
}

th,td{
border:1px solid white;
padding:8px;
}

h2{
background:#3a506b;
padding:10px;
}

</style>

</head>

<body>

<h1>🏆 Points Table</h1>

<div id="tables"></div>


<script>

let groups={

"A":["Argentina","Germany","Canada","Saudi Arabia"],

"B":["Brazil","Portugal","Nigeria","Australia"],

"C":["France","England","Iran","Egypt"],

"D":["Spain","Italy","China","Qatar"],

"E":["Netherlands","Belgium","Japan","South Korea"],

"F":["Croatia","Uruguay","Morocco","Senegal"],

"G":["Colombia","Switzerland","Poland","Denmark"],

"H":["USA","Turkey","Serbia","Ukraine"]

};



let table={};


for(let g in groups){

table[g]={};

groups[g].forEach(team=>{

table[g][team]={
p:0,
w:0,
d:0,
l:0,
gf:0,
ga:0,
pts:0
};

});

}


// Admin Result

let results=JSON.parse(localStorage.groupResults || "[]");



results.forEach(r=>{


let teams=r.match.split(" vs ");

let score=r.score.split("-");


let t1=teams[0].trim();

let t2=teams[1].trim();


let g1=Number(score[0]);

let g2=Number(score[1]);


let group;


for(let g in groups){

if(groups[g].includes(t1)){

group=g;
break;

}

}


if(!group)return;



let a=table[group][t1];

let b=table[group][t2];


a.p++;
b.p++;


a.gf+=g1;
a.ga+=g2;


b.gf+=g2;
b.ga+=g1;



if(g1>g2){

a.w++;
a.pts+=3;
b.l++;

}

else if(g2>g1){

b.w++;
b.pts+=3;
a.l++;

}

else{

a.d++;
b.d++;

a.pts++;
b.pts++;

}


});





let html="";


for(let g in groups){


// LIVE RANKING

groups[g].sort((a,b)=>{


let A=table[g][a];

let B=table[g][b];


// Point বেশি আগে

if(B.pts!==A.pts){

return B.pts-A.pts;

}


// Goal Difference

let difA=A.gf-A.ga;

let difB=B.gf-B.ga;


if(difB!==difA){

return difB-difA;

}


// Goal For

return B.gf-A.gf;


});




html+=`<h2>Group ${g}</h2>`;



html+=`

<table>

<tr>

<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>+</th>
<th>-</th>
<th>Dif</th>
<th>Pts</th>

</tr>

`;



groups[g].forEach((team,i)=>{


let x=table[g][team];


html+=`

<tr>

<td>${i+1}</td>

<td>${team}</td>

<td>${x.p}</td>

<td>${x.w}</td>

<td>${x.d}</td>

<td>${x.l}</td>

<td>${x.gf}</td>

<td>${x.ga}</td>

<td>${x.gf-x.ga}</td>

<td>${x.pts}</td>


</tr>

`;


});


html+="</table>";


}



document.getElementById("tables").innerHTML=html;


</script>


</body>

</html>
