// Round of 16 Auto Generate  
// ===============================  
  
function loadRound16Matches(){  
  
let groups={  
  
"A":["Argentina","Germany","Canada","Saudi Arabia"],  
"B":["Brazil","Portugal","Nigeria","Australia"],  
"C":["France","England","Iran","Egypt"],  
"D":["Spain","Italy","China","Qatar"],  
"E":["Netherlands","Belgium","Japan","South Korea"],  
"F":["Croatia","Uruguay","Morocco","Senegal"],  
"G":["Colombia","Switzerland","Poland","Denmark"],  
"H":["USA","Turkey","Serbia","Ukraine"]  
  
};  
  
  
  
let table={};  
  
  
  
for(let g in groups){  
  
table[g]={};  
  
groups[g].forEach(team=>{  
  
table[g][team]={  
  
pts:0,  
gf:0,  
ga:0  
  
};  
  
});  
  
}  
  
  
  
let results=JSON.parse(localStorage.groupResults||"[]");  
  
  
  
results.forEach(r=>{  
  
let teams=r.match.split(" vs ");  
  
let score=r.score.split("-");  
  
  
let t1=teams[0].trim();  
  
let t2=teams[1].trim();  
  
  
let g1=Number(score[0]);  
  
let g2=Number(score[1]);  
  
  
let group="";  
  
  
for(let x in groups){  
  
if(groups[x].includes(t1)){  
  
group=x;  
  
break;  
  
}  
  
}  
  
  
if(group=="") return;  
  
  
table[group][t1].gf+=g1;  
table[group][t1].ga+=g2;  
  
table[group][t2].gf+=g2;  
table[group][t2].ga+=g1;  
  
  
if(g1>g2){  
  
table[group][t1].pts+=3;  
  
}  
  
else if(g2>g1){  
  
table[group][t2].pts+=3;  
  
}  
  
else{  
  
table[group][t1].pts++;  
  
table[group][t2].pts++;  
  
}  
  
});// ===============================  
// Group Ranking  
// ===============================  
  
let rank={};  
  
for(let g in groups){  
  
rank[g]=[...groups[g]].sort((a,b)=>{  
  
let A=table[g][a];  
let B=table[g][b];  
  
// Points  
if(B.pts!=A.pts)  
return B.pts-A.pts;  
  
// Goal Difference  
let gdA=A.gf-A.ga;  
let gdB=B.gf-B.ga;  
  
if(gdB!=gdA)  
return gdB-gdA;  
  
// Goals For  
if(B.gf!=A.gf)  
return B.gf-A.gf;  
  
// Alphabet  
return a.localeCompare(b);  
  
});  
  
}  
  
  
  
// ===============================  
// Round of 16 Match List  
// ===============================  
  
let list=[  
  
rank.A[0]+" vs "+rank.B[1],  
rank.B[0]+" vs "+rank.A[1],  
  
rank.C[0]+" vs "+rank.D[1],  
rank.D[0]+" vs "+rank.C[1],  
  
rank.E[0]+" vs "+rank.F[1],  
rank.F[0]+" vs "+rank.E[1],  
  
rank.G[0]+" vs "+rank.H[1],  
rank.H[0]+" vs "+rank.G[1]  
  
];  
  
  
  
// Save Match List  
  
localStorage.r16Matches=  
JSON.stringify(list);  
  
  
  
// Load Dropdown  
  
let select=  
document.getElementById("r16match");  
  
select.innerHTML=  
"<option>Select Match</option>";  
  
list.forEach(match=>{  
  
let option=  
document.createElement("option");  
  
option.textContent=match;  
  
select.appendChild(option);  
  
});  
  
}// ===============================

// ===============================  
// Winner Function  
// ===============================  
  
function getWinner(match,score){  
  
let teams=match.split(" vs ");  
  
let s=score.split("-");  
  
let g1=Number(s[0]);  
  
let g2=Number(s[1]);  
  
  
if(g1>g2){  
  
return teams[0].trim();  
  
}  
  
else if(g2>g1){  
  
return teams[1].trim();  
  
}  
  
else{  
  
return "";  
  
}  
  
}// ===============================

window.onload=function(){

// Edit Knockout Result  
// ===============================  
  
function editKnockout(index){  
  
let data=JSON.parse(localStorage.knockoutResults||"[]");  
  
let r=data[index];  
  
let score=r.score.split("-");  
  
  
// Round of 16  
  
if(r.round=="Round of 16"){  
  
r16match.value=r.match;  
  
r16g1.value=score[0].trim();  
  
r16g2.value=score[1].trim();  
  
}  
  
  
// Quarter Final  
  
if(r.round=="Quarter Final"){  
  
qfmatch.value=r.match;  
  
qfg1.value=score[0].trim();  
  
qfg2.value=score[1].trim();  
  
}  
  
  
// Semi Final  
  
if(r.round=="Semi Final"){  
  
sfmatch.value=r.match;  
  
sfg1.value=score[0].trim();  
  
sfg2.value=score[1].trim();  
  
}  
  
  
// Final  
  
if(r.round=="Final"){  
  
finalmatch.value=r.match;  
  
fg1.value=score[0].trim();  
  
fg2.value=score[1].trim();  
  
}  
  
}  
  
  
  
// ===============================  
// Refresh Tournament  
// ===============================  
  
function refreshTournament(){  
  
loadRound16Matches();  
  
generateQuarterFinal();  
  
generateSemiFinal();  
  
generateFinal();  
  
generateChampion();  
  
showKnockout();  
  
showChampion();  
  
}

// Knockout Edit + Delete Button

function renderKnockout(round){

let html="";  
  
data.forEach((r,i)=>{  
  
if(r.round==round){  
  
html+=`  
  
<div class="result">  
  
<b>${r.match}</b>  
  
<br>

</button>  
  
</div>  
  
`;  
  
}  
  
});  
  
return html;  
  
}

// Auto Backup System  
// ===============================  
  
function backupTournament(){  
  
let backup={  
  
groupResults:  
JSON.parse(localStorage.groupResults||"[]"),  
  
knockoutResults:  
JSON.parse(localStorage.knockoutResults||"[]"),  
  
r16Matches:  
JSON.parse(localStorage.r16Matches||"[]"),  
  
qfMatches:  
JSON.parse(localStorage.qfMatches||"[]"),  
  
sfMatches:  
JSON.parse(localStorage.sfMatches||"[]"),  
  
finalMatches:  
JSON.parse(localStorage.finalMatches||"[]"),  
  
champion:  
localStorage.champion||""  
  
};  
  
localStorage.tournamentBackup=  
JSON.stringify(backup);  
  
}  
  
  
  
// ===============================  
// Auto Restore System  
// ===============================  
  
function restoreTournament(){  
  
let backup=  
localStorage.tournamentBackup;  
  
if(!backup) return;  
  
backup=JSON.parse(backup);  
  
  
localStorage.groupResults=  
JSON.stringify(backup.groupResults);  
  
localStorage.knockoutResults=  
JSON.stringify(backup.knockoutResults);  
  
localStorage.r16Matches=  
JSON.stringify(backup.r16Matches);  
  
localStorage.qfMatches=  
JSON.stringify(backup.qfMatches);  
  
localStorage.sfMatches=  
JSON.stringify(backup.sfMatches);  
  
localStorage.finalMatches=  
JSON.stringify(backup.finalMatches);  
  
localStorage.champion=  
backup.champion;  
  
}  
  
  
  
// ===============================  
// Auto Save  
// ===============================  
  
setInterval(function(){  
  
backupTournament();  
  
},3000);  
  
  
  
// ===============================  
// Auto Restore on Load  
// ===============================  
  
restoreTournament();// ===============================  
// Export Tournament Backup  
// ===============================  
  
function exportBackup(){  
  
let backup={  
  
groupResults:JSON.parse(localStorage.groupResults||"[]"),  
  
knockoutResults:JSON.parse(localStorage.knockoutResults||"[]"),  
  
r16Matches:JSON.parse(localStorage.r16Matches||"[]"),  
  
qfMatches:JSON.parse(localStorage.qfMatches||"[]"),  
  
sfMatches:JSON.parse(localStorage.sfMatches||"[]"),  
  
finalMatches:JSON.parse(localStorage.finalMatches||"[]"),  
  
champion:localStorage.champion||""  
  
};  
  
  
let blob=new Blob(  
  
[JSON.stringify(backup,null,2)],  
  
{type:"application/json"}  
  
);  
  
  
let a=document.createElement("a");  
  
a.href=URL.createObjectURL(blob);  
  
a.download="DLS_Tournament_Backup.json";  
  
a.click();  
  
}  
  
  
  
// ===============================  
// Import Tournament Backup  
// ===============================  
  
function importBackup(file){  
  
let reader=new FileReader();  
  
reader.onload=function(e){  
  
let backup=JSON.parse(e.target.result);  
  
  
localStorage.groupResults=  
JSON.stringify(backup.groupResults||[]);  
  
localStorage.knockoutResults=  
JSON.stringify(backup.knockoutResults||[]);  
  
localStorage.r16Matches=  
JSON.stringify(backup.r16Matches||[]);  
  
localStorage.qfMatches=  
JSON.stringify(backup.qfMatches||[]);  
  
localStorage.sfMatches=  
JSON.stringify(backup.sfMatches||[]);  
  
localStorage.finalMatches=  
JSON.stringify(backup.finalMatches||[]);  
  
localStorage.champion=  
backup.champion||"";  
  
  
refreshTournament();  
  
alert("Backup Restored Successfully ✅");  
  
};  
  
reader.readAsText(file);  
  
}

// Backup Buttons

document.body.insertAdjacentHTML(  
  
"beforeend",

<h2>💾 Tournament Backup</h2>  
  
<button onclick="exportBackup()">  
  
⬇ Export Backup  
  
</button>  
  
<br><br>  
  
<input  
  
type="file"  
  
onchange="importBackup(this.files[0])"  
  
>  
  
</div>  
  
`

document.addEventListener("DOMContentLoaded",function(){  
  
initializeTournament();  
  
});

// Auto Refresh Every 2 Seconds  
// ===============================  
  
setInterval(function(){  
  
showGroup();  
  
showKnockout();  
  
},2000);  
  
  
  
// ===============================  
// Keyboard Shortcuts  
// ===============================  
  
document.addEventListener("keydown",function(e){  
  
// Ctrl + S = Backup  
  
if(e.ctrlKey && e.key=="s"){  
  
e.preventDefault();  
  
exportBackup();  
  
}  
  
// Ctrl + R = Refresh Tournament  
  
if(e.ctrlKey && e.key=="r"){  
  
e.preventDefault();  
  
refreshTournament();  
  
}  
  
// Ctrl + Delete = Reset Tournament  
  
if(e.ctrlKey && e.key=="Delete"){  
  
e.preventDefault();  
  
resetTournament();  
  
}  
  
});
